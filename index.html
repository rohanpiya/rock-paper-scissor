<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main-game">
        <h2> Make your choice </h2>
        <button class="choice-btn">rock</button>
        <button class="choice-btn">paper</button>
        <button class="choice-btn">scissors</button>

        <div class="round-results"> </div>
    </div>

    <div class="game-results"> </div>

    <div class="scores">
        <h4>Scores</h4>
        <span> Human: <span class="human-score">0</span> </span>
        <span> Computer: <span class="computer-score">0</span></span>
    </div>

    <button class="start-new-game"> Click to start new game </button>
    <script src="script.js"></script>
</body>

</html>
